name: Build CloudStream Plugin

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v9.3.1/gradle/wrapper/gradle-wrapper.jar"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and Generate
        run: |
          ./gradlew :IPTVPlayer:make
          ./gradlew makePluginsJson
          mkdir -p build_output
          cp IPTVPlayer/build/*.cs3 build_output/ || true
          cp build/plugins.json build_output/plugins.json
          echo '{
            "name": "IPTV Player Provider",
            "description": "IPTV Player - Live TV Streaming Extension",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/senkuboy0-cyber/iptv-player-extension/builds/plugins.json"
            ]
          }' > build_output/repo.json

      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: build_output
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}